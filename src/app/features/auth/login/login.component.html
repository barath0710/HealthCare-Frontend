<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="logo"></div>
      <h1>Appointment Portal</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email"
               placeholder="you@hospital.com"
               [class.invalid]="email?.invalid && email?.touched">
        <span class="err" *ngIf="email?.errors?.['required'] && email?.touched">
          Email is required.
        </span>
        <span class="err" *ngIf="email?.errors?.['email'] && email?.touched">
          Enter a valid email
        </span>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input [type]="showPw ? 'text' : 'password'"
                 formControlName="password" placeholder="Password"
                 [class.invalid]="password?.invalid && password?.touched">
          <button type="button" (click)="showPw = !showPw">
            {{ showPw ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="err" *ngIf="password?.errors?.['required'] && password?.touched">
          Password is required.
        </span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="reg-link">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>
  </div>
</div>
